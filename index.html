<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBX STUDIO SHOP | PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --studio: #00b4d8;
            --studio-dark: #0077b6;
            --bg: #05050b;
            --surface: #0f0f1a;
            --border: #1e1e2f;
            --text: #ffffff;
            --text2: #a0a0b8;
            --gold: #ffb703;
            --red: #ef233c;
            --green: #00f5d4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111122 0%, #05050b 100%);
        }

        /* --- CURSEUR --- */
        #cursor {
            width: 20px; height: 20px;
            border: 2px solid var(--studio);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: transform 0.1s ease;
            box-shadow: 0 0 15px var(--studio);
        }

        /* --- HEADER --- */
        header {
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            letter-spacing: 5px;
            color: var(--studio);
            text-shadow: 0 0 20px var(--studio);
        }

        /* --- GRID CATALOGUE --- */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--studio);
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 180, 216, 0.2);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .card h3 { font-size: 1.5rem; margin-bottom: 10px; color: var(--studio); }
        .card p { color: var(--text2); font-size: 0.9rem; line-height: 1.4; margin-bottom: 15px; }
        
        .price-tag {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- ADMIN PANEL --- */
        #adminBtn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--studio);
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 0 20px var(--studio);
            z-index: 999;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--surface);
            border: 2px solid var(--studio);
            padding: 30px;
            border-radius: 20px;
            z-index: 2000;
            width: 400px;
        }

        .modal input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--border);
            color: white;
            border-radius: 5px;
        }

        .btn-add {
            background: var(--studio);
            width: 100%;
            padding: 10px;
            border: none;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Animation chargement */
        #loader {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            border: 5px solid var(--border);
            border-top: 5px solid var(--studio);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="loader"></div>

<header>
    <h1>RBX STUDIO SHOP</h1>
    <p style="color: var(--text2); letter-spacing: 2px;">PREMIUM BUILDINGS & MODELS</p>
</header>

<div id="adminBtn" onclick="toggleAdmin()">⚙️ PANEL ADMIN</div>

<div class="modal" id="adminModal">
    <h2 style="color: var(--studio); margin-bottom: 15px;">AJOUTER UN BUILD</h2>
    <input type="text" id="addName" placeholder="Nom du bâtiment">
    <input type="number" id="addPrice" placeholder="Prix (Robux)">
    <input type="text" id="addImg" placeholder="Lien image (URL)">
    <button class="btn-add" onclick="createNewBuild()">PUBLIER SUR LE SITE</button>
    <button class="btn-add" style="background: var(--red); margin-top: 5px;" onclick="toggleAdmin()">FERMER</button>
</div>

<div class="container" id="catalog"></div>

<script>
// ════════════ DATA INITIALE (10 BÂTIMENTS) ════════════
const DEFAULT_CATALOG = [
    {id:1, title:'Centre Commercial', price:800, img:'https://picsum.photos/400/300?r=1', desc:'Mall 2 étages complet.'},
    {id:2, title:'Station-Service', price:500, img:'https://picsum.photos/400/300?r=2', desc:'Station réaliste avec shop.'},
    {id:3, title:'Fast-Food Drive', price:400, img:'https://picsum.photos/400/300?r=3', desc:'Restaurant type Burger.'},
    {id:4, title:'Entrepôt', price:550, img:'https://picsum.photos/400/300?r=4', desc:'Zone industrielle.'},
    {id:5, title:'Boutique Moderne', price:300, img:'https://picsum.photos/400/300?r=5', desc:'Vitrine illuminée.'},
    {id:6, title:'Restaurant Gastro', price:600, img:'https://picsum.photos/400/300?r=6', desc:'Luxe et terrasse.'},
    {id:7, title:'Immeuble Bureaux', price:900, img:'https://picsum.photos/400/300?r=7', desc:'6 étages vitrés.'},
    {id:8, title:'Garage Mécanique', price:450, img:'https://picsum.photos/400/300?r=8', desc:'Avec ponts élévateurs.'},
    {id:9, title:'Supermarché', price:750, img:'https://picsum.photos/400/300?r=9', desc:'Rayons complets.'},
    {id:10, title:'Parking Niveaux', price:550, img:'https://picsum.photos/400/300?r=10', desc:'80 places auto.'}
];

// ════════════ LOGIQUE DE SAUVEGARDE ════════════
let products = JSON.parse(localStorage.getItem('rbx_pro_save')) || DEFAULT_CATALOG;

function render() {
    const catalog = document.getElementById('catalog');
    if (!catalog) return;
    
    catalog.innerHTML = products.map(p => `
        <div class="card">
            <img src="${p.img}" alt="${p.title}">
            <h3>${p.title}</h3>
            <p>${p.desc}</p>
            <div class="price-tag">${p.price} <span style="font-size: 0.8rem">R$</span></div>
        </div>
    `).join('');
    
    document.getElementById('loader').style.display = 'none';
}

function createNewBuild() {
    const name = document.getElementById('addName').value;
    const price = document.getElementById('addPrice').value;
    const img = document.getElementById('addImg').value;

    if(name && price && img) {
        const newObj = {
            id: Date.now(),
            title: name,
            price: price,
            img: img,
            desc: "Nouveau bâtiment premium."
        };
        products.push(newObj);
        localStorage.setItem('rbx_pro_save', JSON.stringify(products)); // SAUVEGARDE
        render();
        toggleAdmin();
        alert("Bâtiment ajouté !");
    } else {
        alert("Remplis tous les champs !");
    }
}

// ════════════ EFFETS & INTERFACE ════════════
function toggleAdmin() {
    const m = document.getElementById('adminModal');
    m.style.display = (m.style.display === 'block') ? 'none' : 'block';
}

// Curseur
document.addEventListener('mousemove', (e) => {
    const c = document.getElementById('cursor');
    c.style.left = e.clientX - 10 + 'px';
    c.style.top = e.clientY - 10 + 'px';
});

// Lancement
window.onload = render;
</script>

</body>
</html>
